# Spam Detection System - Configuration File

# Flask Configuration
FLASK_DEBUG = True
FLASK_ENV = development
FLASK_HOST = 0.0.0.0
FLASK_PORT = 5000

# Model Configuration
MODEL_PATH = models/spam_model.pkl
DATA_PATH = data/spam_data.csv

# Vectorizer Configuration
VECTORIZER_MAX_FEATURES = 5000
VECTORIZER_NGRAM_RANGE = (1, 2)
VECTORIZER_MIN_DF = 2
VECTORIZER_MAX_DF = 0.8
VECTORIZER_USE_TFIDF = True

# Naive Bayes Configuration
NB_ALPHA = 1.0

# Train/Test Split
TEST_SIZE = 0.2
RANDOM_STATE = 42

# File Upload Configuration
MAX_FILE_SIZE = 10485760  # 10MB in bytes
ALLOWED_FILE_EXTENSIONS = ['.txt']

# API Configuration
API_CORS_ORIGINS = ['*']
API_MAX_BATCH_SIZE = 1000

# Logging Configuration
LOG_LEVEL = INFO
LOG_FILE = logs/spam_detection.log
